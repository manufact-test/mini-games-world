name: Actions Permission Probe

on:
  push:
    branches:
      - agent/actions-permission-probe-20260722

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm runner
        run: |
          printf 'ACTIONS_PROBE_OK\n'
          printf 'RUN_ID=%s\n' "$GITHUB_RUN_ID"
          printf 'COMMIT=%s\n' "$GITHUB_SHA"

      - name: Report safe result to issue 94
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PROBE_STATUS: ${{ job.status }}
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/probe-comment.json"
          import json
          import os

          body = "\n".join([
              "<!-- mgw-actions-permission-probe -->",
              "## Actions permission probe",
              "",
              f"- run_id: `{os.environ.get('GITHUB_RUN_ID', '')}`",
              f"- commit: `{os.environ.get('GITHUB_SHA', '')}`",
              f"- status: `{os.environ.get('PROBE_STATUS', '')}`",
              "- production_or_hostinger_action: `false`",
          ])
          print(json.dumps({"body": body}))
          PY
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/94/comments" \
            --data-binary "@$RUNNER_TEMP/probe-comment.json"

  full_php83_gate:
    name: Full PHP 8.3 gate for exact PR 91 commit
    needs: probe
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    env:
      MGW_TARGET_COMMIT: 09d7393fe7f4a4bcde17c588c79dd3e924959034
      MGW_CI_TIMEOUT_SECONDS: '2700'

    steps:
      - name: Checkout exact PR 91 commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.MGW_TARGET_COMMIT }}
          persist-credentials: false
          clean: true

      - name: Initialize private evidence paths
        run: |
          printf 'MGW_CI_OUTPUT_DIR=%s\n' "$RUNNER_TEMP/mgw-current-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          printf 'MGW_CI_VERIFICATION_FILE=%s\n' "$RUNNER_TEMP/mgw-current-ci-verification-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json" >> "$GITHUB_ENV"

      - name: Bind exact checked-out commit
        id: bind
        run: |
          commit="$(git rev-parse --verify HEAD)"
          if [ "$commit" != "$MGW_TARGET_COMMIT" ]; then
            printf 'checked-out commit mismatch\n' >&2
            exit 1
          fi
          printf 'MGW_CI_EXPECTED_COMMIT=%s\n' "$commit" >> "$GITHUB_ENV"
          printf 'commit=%s\n' "$commit" >> "$GITHUB_OUTPUT"
          printf 'CHECKED_OUT_COMMIT=%s\n' "$commit"

      - name: Confirm exact PHP 8.3 runtime
        run: |
          php -r 'printf("PHP_VERSION=%s\nPHP_VERSION_ID=%d\n", PHP_VERSION, PHP_VERSION_ID); exit(PHP_VERSION_ID >= 80300 && PHP_VERSION_ID < 80400 ? 0 : 1);'
          php -r 'foreach (["json", "pdo", "pdo_sqlite", "openssl", "mbstring"] as $extension) { if (!extension_loaded($extension)) { fwrite(STDERR, "missing PHP extension: {$extension}\n"); exit(1); } }'
          timeout --version | head -n 1

      - name: Run current portable focused suite
        run: bash ops/ci/run-current-portable-focused-suite.sh

      - name: Verify exact current evidence bundle
        run: |
          umask 077
          php ops/ci/verify-current-portable-focused-suite-evidence.php \
            --evidence-dir="$MGW_CI_OUTPUT_DIR" \
            --expected-commit="$MGW_TARGET_COMMIT" \
            --max-age-seconds=3600 \
            > "$MGW_CI_VERIFICATION_FILE"
          chmod 0600 "$MGW_CI_VERIFICATION_FILE"
          cat "$MGW_CI_VERIFICATION_FILE"

      - name: Upload current focused-suite evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mgw-current-focused-${{ env.MGW_TARGET_COMMIT }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite.log
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite-summary.json
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite-manifest.json
            ${{ env.MGW_CI_VERIFICATION_FILE }}
          if-no-files-found: warn
          retention-days: 7

      - name: Report safe full-gate result to issue 94
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          MGW_JOB_STATUS: ${{ job.status }}
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/mgw-full-gate-comment.json"
          import json
          import os

          body = "\n".join([
              "<!-- mgw-current-portable-exact-commit-report -->",
              "## Full PHP 8.3 gate report",
              "",
              f"- run_id: `{os.environ.get('GITHUB_RUN_ID', '')}`",
              f"- run_attempt: `{os.environ.get('GITHUB_RUN_ATTEMPT', '')}`",
              f"- exact_commit: `{os.environ.get('MGW_TARGET_COMMIT', '')}`",
              f"- job_status: `{os.environ.get('MGW_JOB_STATUS', '')}`",
              "- staging_or_production_action: `false`",
          ])
          print(json.dumps({"body": body}))
          PY
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/94/comments" \
            --data-binary "@$RUNNER_TEMP/mgw-full-gate-comment.json"
