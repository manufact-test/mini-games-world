name: Actions Permission Probe

on:
  push:
    branches:
      - agent/actions-permission-probe-20260722

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Confirm runner
        run: |
          printf 'ACTIONS_PROBE_OK\n'
          printf 'RUN_ID=%s\n' "$GITHUB_RUN_ID"
          printf 'COMMIT=%s\n' "$GITHUB_SHA"

      - name: Report safe result to issue 93
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PROBE_STATUS: ${{ job.status }}
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/probe-comment.json"
          import json
          import os

          body = "\n".join([
              "<!-- mgw-actions-permission-probe -->",
              "## Actions permission probe",
              "",
              f"- run_id: `{os.environ.get('GITHUB_RUN_ID', '')}`",
              f"- commit: `{os.environ.get('GITHUB_SHA', '')}`",
              f"- status: `{os.environ.get('PROBE_STATUS', '')}`",
              "- production_or_hostinger_action: `false`",
          ])
          print(json.dumps({"body": body}))
          PY
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/93/comments" \
            --data-binary "@$RUNNER_TEMP/probe-comment.json"
