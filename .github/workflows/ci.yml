name: Mini Games World CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mgw-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: mgw_ci
          MYSQL_USER: mgw_ci_user
          MYSQL_PASSWORD: ci_database_password_not_secret
          MYSQL_ROOT_PASSWORD: ci_root_password_not_secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      MGW_TEST_MYSQL_DSN: mysql:host=127.0.0.1;port=3306;dbname=mgw_ci;charset=utf8mb4
      MGW_TEST_MYSQL_USER: mgw_ci_user
      MGW_TEST_MYSQL_PASSWORD: ci_database_password_not_secret

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, pdo_sqlite
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run repository checks
        shell: bash
        run: |
          set -o pipefail
          bash scripts/ci/run.sh 2>&1 | tee ci-report.txt

      - name: Upload CI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-report
          path: ci-report.txt
          if-no-files-found: error
          retention-days: 3
