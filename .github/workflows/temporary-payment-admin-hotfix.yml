name: Temporary payment admin hotfix

on:
  push:
    branches:
      - agent/mvp-14-8-5b-payment-admin-waiting-first

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/mvp-14-8-5b-payment-admin-waiting-first
          fetch-depth: 0

      - name: Prioritize waiting payment requests
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('bot/services/PaymentService.php')
          source = path.read_text(encoding='utf-8')
          start_marker = '    public function adminList(array $db, int $limit = 12): string\n'
          end_marker = '    public function adminSummary(array $db): array\n'
          start = source.index(start_marker)
          end = source.index(end_marker, start)

          method = '''    public function adminList(array $db, int $limit = 12): string
              {
                  $summary = $this->adminSummary($db);
                  $payments = array_values(array_filter(
                      array_reverse($db['payments'] ?? []),
                      static fn(mixed $payment): bool => is_array($payment)
                  ));

                  $waitingPayments = [];
                  $processedPayments = [];
                  foreach ($payments as $payment) {
                      $status = (string)($payment['status'] ?? 'draft');
                      if ($this->isWaitingStatus($status)) {
                          $waitingPayments[] = $payment;
                      } else {
                          $processedPayments[] = $payment;
                      }
                  }

                  $lines = ["💳 Платежи"];
                  $lines[] = "\nЗаявки создаются из Mini App. Начисление делает админ вручную.";
                  $lines[] = "Всего заявок: " . $summary['total'];
                  $lines[] = "Ожидают решения: " . $summary['waiting'];
                  $lines[] = "Начислены: " . $summary['paid'];
                  $lines[] = "Отклонены: " . $summary['rejected'];

                  if ($summary['cancelled'] > 0) {
                      $lines[] = "Отменены: " . $summary['cancelled'];
                  }
                  if ($summary['inconsistent'] > 0) {
                      $lines[] = "⚠️ Несогласованные записи: " . $summary['inconsistent'];
                  }
                  if ($summary['invalid'] > 0) {
                      $lines[] = "⚠️ Некорректные записи: " . $summary['invalid'];
                  }

                  if ($payments) {
                      $visibleWaiting = array_slice($waitingPayments, 0, max(0, $limit));
                      if ($visibleWaiting) {
                          $lines[] = "\n⏳ Ожидают решения:";
                          foreach ($visibleWaiting as $payment) {
                              $lines[] = "\n" . $this->adminPaymentCard($payment, $db);
                          }
                      }

                      $hiddenWaiting = count($waitingPayments) - count($visibleWaiting);
                      if ($hiddenWaiting > 0) {
                          $lines[] = "\nЕщё ожидают решения: {$hiddenWaiting}. Обработайте показанные заявки и обновите список.";
                      }

                      $remaining = max(0, $limit - count($visibleWaiting));
                      $visibleProcessed = array_slice($processedPayments, 0, $remaining);
                      if ($visibleProcessed) {
                          $lines[] = "\nПоследние обработанные:";
                          foreach ($visibleProcessed as $payment) {
                              $lines[] = "\n" . $this->adminPaymentCard($payment, $db);
                          }
                      }
                  } else {
                      $lines[] = "\nПлатежных заявок пока нет.";
                  }

                  $lines[] = "\nКоманды:";
                  $lines[] = "/mgw_private_admin_7291_payment ID — открыть заявку";
                  $lines[] = "/mgw_private_admin_7291_payment_apply ID — подтвердить и начислить";
                  $lines[] = "/mgw_private_admin_7291_payment_reject ID причина — отклонить";

                  return implode("\n", $lines);
              }

          '''

          path.write_text(source[:start] + method + source[end:], encoding='utf-8')

          test = Path('bot/tests/PaymentAdminListPriorityTest.php')
          test.write_text('''<?php
          declare(strict_types=1);

          require dirname(__DIR__) . '/services/UserService.php';
          require dirname(__DIR__) . '/services/PaymentService.php';

          $assertions = 0;
          $assertTrue = static function (bool $condition, string $message) use (&$assertions): void {
              $assertions++;
              if (!$condition) {
                  throw new RuntimeException($message);
              }
          };
          $assertContains = static function (string $needle, string $actual, string $message) use (&$assertions): void {
              $assertions++;
              if (!str_contains($actual, $needle)) {
                  throw new RuntimeException($message . ': missing ' . var_export($needle, true));
              }
          };
          $assertNotContains = static function (string $needle, string $actual, string $message) use (&$assertions): void {
              $assertions++;
              if (str_contains($actual, $needle)) {
                  throw new RuntimeException($message . ': unexpectedly found ' . var_export($needle, true));
              }
          };

          $payments = [
              [
                  'id' => 'pay_WAIT0001AAAA',
                  'user_id' => 'u1',
                  'status' => 'draft',
                  'room' => 'match',
                  'coins' => 2,
                  'price' => 1,
                  'currency' => 'RUB',
                  'balance_applied' => false,
                  'created_at' => '2026-07-01T10:00:00+00:00',
              ],
              [
                  'id' => 'pay_WAIT0002BBBB',
                  'user_id' => 'u1',
                  'status' => 'pending',
                  'room' => 'gold',
                  'coins' => 5,
                  'price' => 5,
                  'currency' => 'RUB',
                  'balance_applied' => false,
                  'created_at' => '2026-07-01T11:00:00+00:00',
              ],
          ];

          for ($i = 1; $i <= 12; $i++) {
              $suffix = str_pad((string)$i, 4, '0', STR_PAD_LEFT);
              $paid = $i % 2 === 0;
              $payments[] = [
                  'id' => 'pay_DONE' . $suffix . 'ZZZZ',
                  'user_id' => 'u1',
                  'status' => $paid ? 'paid' : 'rejected',
                  'room' => 'match',
                  'coins' => 2,
                  'price' => 1,
                  'currency' => 'RUB',
                  'balance_applied' => $paid,
                  'created_at' => sprintf('2026-07-%02dT12:00:00+00:00', $i + 1),
              ];
          }

          $db = [
              'users' => [
                  'u1' => [
                      'id' => 'u1',
                      'first_name' => 'Тест',
                      'username' => 'test_user',
                  ],
              ],
              'payments' => $payments,
          ];

          $service = new PaymentService([], new UserService([]));
          $output = $service->adminList($db, 12);

          $assertContains('⏳ Ожидают решения:', $output, 'Waiting section must be present');
          $assertContains('№ WAIT0001 · ожидает решения', $output, 'Old draft must remain visible');
          $assertContains('№ WAIT0002 · ожидает решения', $output, 'Old pending request must remain visible');
          $assertContains('Последние обработанные:', $output, 'Processed section must remain visible');
          $assertContains('№ DONE0012', $output, 'Newest processed payment must be visible');
          $assertNotContains('№ DONE0001', $output, 'Old processed payment must yield its slot to waiting requests');
          $assertTrue(
              strpos($output, '№ WAIT0001') < strpos($output, 'Последние обработанные:'),
              'Waiting requests must appear before processed requests'
          );
          $assertTrue(substr_count($output, "\n№ ") === 12, 'Visible payment card count must respect the list limit');

          fwrite(STDOUT, "PaymentAdminListPriorityTest passed: {$assertions} assertions.\n");
          ''', encoding='utf-8')
          PY

      - name: Validate hotfix
        shell: bash
        run: |
          php -l bot/services/PaymentService.php
          php -l bot/tests/PaymentAdminListPriorityTest.php
          php bot/tests/PaymentAdminListPriorityTest.php

      - name: Commit generated hotfix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot/services/PaymentService.php bot/tests/PaymentAdminListPriorityTest.php
          git commit -m "Fix payment admin waiting request visibility"
          git push origin HEAD:agent/mvp-14-8-5b-payment-admin-waiting-first
