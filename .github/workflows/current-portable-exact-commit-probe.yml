name: Database Connection Contract Scan

on:
  push:
    branches:
      - agent/actions-permission-probe-20260722

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      MGW_TARGET_COMMIT: e8c94d436110ba5ab20058f7969d2abbf611dba4

    steps:
      - name: Checkout exact PR 91 commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.MGW_TARGET_COMMIT }}
          persist-credentials: false
          clean: true

      - name: Scan interface implementations
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          report="$RUNNER_TEMP/missing-fetch-value.txt"
          : > "$report"
          while IFS= read -r file; do
            if ! grep -Eq 'function[[:space:]]+fetchValue[[:space:]]*\(' "$file"; then
              printf '%s\n' "$file" >> "$report"
            fi
          done < <(grep -RIl --include='*.php' 'implements DatabaseConnectionInterface' bot | sort)
          count="$(wc -l < "$report" | tr -d ' ')"
          printf 'missing_count=%s\n' "$count" >> "$GITHUB_OUTPUT"
          printf 'MISSING_FETCHVALUE_COUNT=%s\n' "$count"
          sed 's/^/MISSING_FETCHVALUE_FILE=/' "$report"

      - name: Report scan to issue 93
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          MISSING_COUNT: ${{ steps.scan.outputs.missing_count }}
        run: |
          python3 - <<'PY' > "$RUNNER_TEMP/scan-comment.json"
          import json
          import os
          from pathlib import Path

          report = Path(os.environ['RUNNER_TEMP']) / 'missing-fetch-value.txt'
          files = report.read_text().splitlines() if report.exists() else []
          lines = [
              '<!-- mgw-database-connection-contract-scan -->',
              '## Database connection contract scan',
              '',
              f"- run_id: `{os.environ.get('GITHUB_RUN_ID', '')}`",
              f"- exact_commit: `{os.environ.get('MGW_TARGET_COMMIT', '')}`",
              f"- missing_fetch_value_count: `{len(files)}`",
              '- production_or_hostinger_action: `false`',
          ]
          if files:
              lines.append('')
              lines.append('Missing implementations:')
              lines.extend(f'- `{path}`' for path in files)
          print(json.dumps({'body': '\n'.join(lines)}))
          PY
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/issues/93/comments" \
            --data-binary "@$RUNNER_TEMP/scan-comment.json"
