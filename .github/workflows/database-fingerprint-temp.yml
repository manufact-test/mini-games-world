name: Temporary database fingerprint refactor

on:
  push:
    branches:
      - agent/mvp-14-2-database-migrations

permissions:
  contents: write

jobs:
  update-fingerprint:
    if: ${{ !contains(github.event.head_commit.message, '[database-fingerprint-refactor]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mvp-14-2-database-migrations
          fetch-depth: 0
      - run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('bot/core/ConfigValidator.php')
          source = path.read_text(encoding='utf-8')
          old = "    private static function databaseFingerprint(array $config): string\n    {\n        $database = is_array($config['database'] ?? null) ? $config['database'] : [];"
          new = "    private static function databaseFingerprint(array $config): string\n    {\n        $databaseConfig = DatabaseConfig::fromApplicationConfig($config);\n        if (!$databaseConfig->enabled()) {\n            return '';\n        }\n\n        $database = is_array($config['database'] ?? null) ? $config['database'] : [];"
          if source.count(old) != 1:
              raise SystemExit('databaseFingerprint anchor mismatch')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot/core/ConfigValidator.php
          git commit -m "Ignore disabled database fingerprints [database-fingerprint-refactor]"
          git push origin HEAD:agent/mvp-14-2-database-migrations
