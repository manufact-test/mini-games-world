name: MGW one-shot account import fix

on:
  push:
    branches:
      - agent/mvp-14-account-import-update-parameter-fix
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/mvp-14-account-import-update-parameter-fix
          fetch-depth: 0

      - name: Apply exact fix and regression test
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          service_path = Path('bot/accounts/LegacyAccountImportService.php')
          source = service_path.read_text(encoding='utf-8')
          old = """            'UPDATE mgw_users SET status = :status, display_name = :display_name,
                username = :username, avatar_provider = :avatar_provider,
                avatar_external_ref = :avatar_external_ref, updated_at_utc = :updated_at_utc,
                last_seen_at_utc = :last_seen_at_utc
             WHERE mgw_id = :mgw_id',"""
          new = """            'UPDATE mgw_users SET status = :status, display_name = :display_name,
                username = :username, avatar_provider = :avatar_provider,
                avatar_external_ref = :avatar_external_ref, created_at_utc = :created_at_utc,
                updated_at_utc = :updated_at_utc, last_seen_at_utc = :last_seen_at_utc
             WHERE mgw_id = :mgw_id',"""
          if source.count(old) != 1:
              raise SystemExit('Expected one exact LegacyAccountImportService update query.')
          service_path.write_text(source.replace(old, new), encoding='utf-8')

          test_path = Path('bot/tests/LegacyAccountImportUpdateParameterTest.php')
          test_path.write_text(r'''<?php
declare(strict_types=1);

$root = dirname(__DIR__);
require $root . '/storage/contracts/StorageTransactionInterface.php';
require $root . '/storage/contracts/StorageAdapterInterface.php';
require $root . '/database/DatabaseConnectionInterface.php';
require $root . '/database/PdoDatabaseConnection.php';
require $root . '/accounts/LegacyAccountImportService.php';

final class LegacyAccountImportUpdateSpyDatabase implements DatabaseConnectionInterface
{
    public string $sql = '';
    public array $parameters = [];

    public function driver(): string { return 'mysql'; }
    public function execute(string $sql, array $parameters = []): int
    {
        $this->sql = $sql;
        $this->parameters = $parameters;
        return 1;
    }
    public function fetchAll(string $sql, array $parameters = []): array { return []; }
    public function fetchValue(string $sql, array $parameters = []): mixed { return null; }
    public function transaction(callable $callback): mixed { return $callback($this); }
}

final class LegacyAccountImportUpdateEmptyStorage implements StorageAdapterInterface
{
    public function transaction(callable $callback): mixed { $data = []; return $callback($data); }
    public function readOnly(callable $callback): mixed { return $callback([]); }
    public function driver(): string { return 'json'; }
}

$assertions = 0;
$assertTrue = static function (bool $condition, string $message) use (&$assertions): void {
    $assertions++;
    if (!$condition) throw new RuntimeException($message);
};

$database = new LegacyAccountImportUpdateSpyDatabase();
$service = new LegacyAccountImportService(new LegacyAccountImportUpdateEmptyStorage(), $database);
$method = new ReflectionMethod(LegacyAccountImportService::class, 'updateUser');
$method->invoke($service, $database, 'mgw_0123456789abcdef0123456789abcdef', [
    'display_name' => 'Player',
    'username' => 'player',
    'avatar_provider' => null,
    'avatar_external_ref' => null,
    'created_at_utc' => '2026-07-17 10:00:00.000000',
    'updated_at_utc' => '2026-07-17 11:00:00.000000',
    'last_seen_at_utc' => '2026-07-17 11:00:00.000000',
]);

preg_match_all('/:[A-Za-z_][A-Za-z0-9_]*/', $database->sql, $matches);
$sqlParameters = array_values(array_unique(array_map(
    static fn(string $value): string => ltrim($value, ':'),
    $matches[0]
)));
sort($sqlParameters, SORT_STRING);
$boundParameters = array_keys($database->parameters);
sort($boundParameters, SORT_STRING);

$assertTrue(
    $sqlParameters === $boundParameters,
    'Native PDO update query placeholders must exactly match the bound parameter set.'
);
$assertTrue(
    str_contains($database->sql, 'created_at_utc = :created_at_utc'),
    'Existing account update must persist the source creation timestamp used by verification.'
);
$assertTrue(
    ($database->parameters['created_at_utc'] ?? null) === '2026-07-17 10:00:00.000000',
    'Existing account update must bind the creation timestamp.'
);

fwrite(STDOUT, "LegacyAccountImportUpdateParameterTest passed: {$assertions} assertions.\n");
''', encoding='utf-8')

          workflow = Path('.github/workflows/mgw-one-shot-account-import-fix.yml')
          workflow.unlink()
          PY

      - name: Commit exact patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot/accounts/LegacyAccountImportService.php bot/tests/LegacyAccountImportUpdateParameterTest.php .github/workflows/mgw-one-shot-account-import-fix.yml
          git commit -m "fix(cutover): align account update parameters"
          git push origin HEAD:agent/mvp-14-account-import-update-parameter-fix
