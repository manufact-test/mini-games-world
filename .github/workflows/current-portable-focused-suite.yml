name: Current Portable Focused Suite

# Temporary GitHub-hosted gate while the repository is public during MVP development.
on:
  push:
    branches:
      - agent/mvp-14-8-6t-current-portable-evidence-verifier
  pull_request:
    branches:
      - agent/mvp-14-8-6s-current-portable-validation
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mgw-current-portable-focused-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  focused:
    name: Current DB-primary smoke and evidence stack
    runs-on: ubuntu-latest
    timeout-minutes: 50
    env:
      MGW_CI_OUTPUT_DIR: ${{ runner.temp }}/mgw-current-ci-${{ github.run_id }}-${{ github.run_attempt }}
      MGW_CI_TIMEOUT_SECONDS: '2700'
      MGW_CI_VERIFICATION_FILE: ${{ runner.temp }}/mgw-current-ci-verification-${{ github.run_id }}-${{ github.run_attempt }}.json

    steps:
      - name: Checkout exact repository revision
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: true

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, pdo, pdo_sqlite, openssl, mbstring
          coverage: none

      - name: Confirm exact PHP runtime
        run: |
          php -r 'printf("PHP_VERSION=%s\nPHP_VERSION_ID=%d\n", PHP_VERSION, PHP_VERSION_ID); exit(PHP_VERSION_ID >= 80300 && PHP_VERSION_ID < 80400 ? 0 : 1);'
          timeout --version | head -n 1

      - name: Run current portable focused suite
        run: bash ops/ci/run-current-portable-focused-suite.sh

      - name: Verify exact current evidence bundle
        run: |
          umask 077
          php ops/ci/verify-current-portable-focused-suite-evidence.php \
            --evidence-dir="$MGW_CI_OUTPUT_DIR" \
            --expected-commit="$GITHUB_SHA" \
            --max-age-seconds=3600 \
            > "$MGW_CI_VERIFICATION_FILE"
          chmod 0600 "$MGW_CI_VERIFICATION_FILE"
          cat "$MGW_CI_VERIFICATION_FILE"

      - name: Show safe reports
        if: always()
        run: |
          if [ -f "$MGW_CI_OUTPUT_DIR/current-focused-suite-summary.json" ]; then
            cat "$MGW_CI_OUTPUT_DIR/current-focused-suite-summary.json"
          else
            printf '{"ok":false,"action":"current_portable_ci_summary_missing"}\n'
          fi
          if [ -f "$MGW_CI_VERIFICATION_FILE" ]; then
            cat "$MGW_CI_VERIFICATION_FILE"
          else
            printf '{"ok":false,"action":"current_portable_ci_verification_missing"}\n'
          fi

      - name: Upload current focused-suite evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mgw-current-focused-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite.log
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite-summary.json
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite-manifest.json
            ${{ env.MGW_CI_VERIFICATION_FILE }}
          if-no-files-found: error
          retention-days: 7
