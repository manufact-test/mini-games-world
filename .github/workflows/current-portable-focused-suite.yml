name: Current Portable Focused Suite

on:
  pull_request:
    branches:
      - agent/mvp-14-8-6v-ci-base-2

permissions:
  contents: read

concurrency:
  group: mgw-current-portable-focused-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  focused:
    name: Current DB-primary smoke and evidence stack
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    env:
      MGW_CI_TIMEOUT_SECONDS: '2700'

    steps:
      - name: Checkout exact candidate revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          clean: true

      - name: Initialize private evidence paths
        run: |
          printf 'MGW_CI_OUTPUT_DIR=%s\n' "$RUNNER_TEMP/mgw-current-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          printf 'MGW_CI_VERIFICATION_FILE=%s\n' "$RUNNER_TEMP/mgw-current-ci-verification-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json" >> "$GITHUB_ENV"
          printf 'MGW_MUTATING_CORE_LOG=%s\n' "$RUNNER_TEMP/mgw-mutating-core-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.log" >> "$GITHUB_ENV"

      - name: Bind exact checked-out commit
        id: bind
        run: |
          commit="$(git rev-parse --verify HEAD)"
          if [[ ! "$commit" =~ ^[a-f0-9]{40}$ ]]; then
            printf 'invalid checked-out commit\n' >&2
            exit 1
          fi
          printf 'MGW_CI_EXPECTED_COMMIT=%s\n' "$commit" >> "$GITHUB_ENV"
          printf 'commit=%s\n' "$commit" >> "$GITHUB_OUTPUT"
          printf 'CHECKED_OUT_COMMIT=%s\n' "$commit"

      - name: Confirm exact PHP 8.3 runtime
        run: |
          php -r 'printf("PHP_VERSION=%s\nPHP_VERSION_ID=%d\n", PHP_VERSION, PHP_VERSION_ID); exit(PHP_VERSION_ID >= 80300 && PHP_VERSION_ID < 80400 ? 0 : 1);'
          php -r 'foreach (["json", "pdo", "pdo_sqlite", "openssl", "mbstring"] as $extension) { if (!extension_loaded($extension)) { fwrite(STDERR, "missing PHP extension: {$extension}\n"); exit(1); } }'
          timeout --version | head -n 1

      - name: Lint bounded mutating smoke core
        run: |
          php -l bot/runtime/RuntimePrimaryStagingMutatingSmokeApproval.php
          php -l bot/runtime/RuntimePrimaryStagingMutatingSmokeRollbackSignal.php
          php -l bot/runtime/RuntimePrimaryStagingBoundedMutatingSmoke.php
          php -l bot/tests/RuntimePrimaryStagingMutatingSmokeApprovalTest.php
          php -l bot/tests/RuntimePrimaryStagingBoundedMutatingSmokeTest.php

      - name: Verify bounded mutating smoke approval
        run: php bot/tests/RuntimePrimaryStagingMutatingSmokeApprovalTest.php

      - name: Verify rollback-only bounded mutating smoke
        id: mutating_core
        continue-on-error: true
        run: |
          set -o pipefail
          php bot/tests/RuntimePrimaryStagingBoundedMutatingSmokeTest.php 2>&1 | tee "$MGW_MUTATING_CORE_LOG"

      - name: Upload bounded mutating core diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mgw-mutating-core-${{ steps.bind.outputs.commit }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ env.MGW_MUTATING_CORE_LOG }}
          if-no-files-found: error
          retention-days: 1

      - name: Enforce bounded mutating core result
        run: test "${{ steps.mutating_core.outcome }}" = 'success'

      - name: Run current portable focused suite
        run: bash ops/ci/run-current-portable-focused-suite.sh

      - name: Verify exact current evidence bundle
        run: |
          umask 077
          php ops/ci/verify-current-portable-focused-suite-evidence.php \
            --evidence-dir="$MGW_CI_OUTPUT_DIR" \
            --expected-commit="$MGW_CI_EXPECTED_COMMIT" \
            --max-age-seconds=3600 \
            > "$MGW_CI_VERIFICATION_FILE"
          chmod 0600 "$MGW_CI_VERIFICATION_FILE"
          cat "$MGW_CI_VERIFICATION_FILE"

      - name: Upload current focused-suite evidence
        uses: actions/upload-artifact@v4
        with:
          name: mgw-current-focused-${{ steps.bind.outputs.commit }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite.log
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite-summary.json
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite-manifest.json
            ${{ env.MGW_CI_VERIFICATION_FILE }}
          if-no-files-found: error
          retention-days: 7
