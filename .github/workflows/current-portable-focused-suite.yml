name: Current Portable Focused Suite

on:
  pull_request:
    branches:
      - agent/mvp-14-8-6v-ci-base-2

permissions:
  contents: read

concurrency:
  group: mgw-current-portable-focused-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  focused:
    name: Current DB-primary smoke and evidence stack
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    env:
      MGW_CI_TIMEOUT_SECONDS: '2700'

    steps:
      - name: Checkout exact candidate revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false
          clean: true

      - name: Initialize private evidence paths
        run: |
          printf 'MGW_CI_OUTPUT_DIR=%s\n' "$RUNNER_TEMP/mgw-current-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_ENV"
          printf 'MGW_CI_VERIFICATION_FILE=%s\n' "$RUNNER_TEMP/mgw-current-ci-verification-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.json" >> "$GITHUB_ENV"

      - name: Bind exact checked-out commit
        id: bind
        run: |
          commit="$(git rev-parse --verify HEAD)"
          if [[ ! "$commit" =~ ^[a-f0-9]{40}$ ]]; then
            printf 'invalid checked-out commit\n' >&2
            exit 1
          fi
          printf 'MGW_CI_EXPECTED_COMMIT=%s\n' "$commit" >> "$GITHUB_ENV"
          printf 'commit=%s\n' "$commit" >> "$GITHUB_OUTPUT"
          printf 'CHECKED_OUT_COMMIT=%s\n' "$commit"

      - name: Confirm exact PHP 8.3 runtime
        run: |
          php -r 'printf("PHP_VERSION=%s\nPHP_VERSION_ID=%d\n", PHP_VERSION, PHP_VERSION_ID); exit(PHP_VERSION_ID >= 80300 && PHP_VERSION_ID < 80400 ? 0 : 1);'
          php -r 'foreach (["json", "pdo", "pdo_sqlite", "openssl", "mbstring"] as $extension) { if (!extension_loaded($extension)) { fwrite(STDERR, "missing PHP extension: {$extension}\n"); exit(1); } }'
          timeout --version | head -n 1

      - name: Lint full bounded mutating smoke stack
        run: |
          files=(
            bot/runtime/RuntimePrimaryStagingMutatingSmokeApproval.php
            bot/runtime/RuntimePrimaryStagingMutatingSmokeRollbackSignal.php
            bot/runtime/RuntimePrimaryStagingBoundedMutatingSmoke.php
            bot/runtime/RuntimePrimaryStagingMutatingSmokeRollbackGuard.php
            bot/runtime/RuntimePrimaryStagingReadOnlyCheckpointReceipt.php
            bot/runtime/RuntimePrimaryStagingBoundedMutatingSmokeEvidenceVerifier.php
            ops/runtime/prepare-staging-bounded-mutating-smoke.php
            ops/runtime/run-staging-bounded-mutating-smoke.php
            ops/runtime/verify-staging-bounded-mutating-smoke-evidence.php
            ops/runtime/write-staging-read-only-checkpoint-receipt.php
            bot/tests/RuntimePrimaryStagingMutatingSmokeApprovalTest.php
            bot/tests/RuntimePrimaryStagingBoundedMutatingSmokeTest.php
            bot/tests/RuntimePrimaryStagingBoundedMutatingSmokeExactIdentityTest.php
            bot/tests/RuntimePrimaryStagingMutatingSmokeRollbackGuardTest.php
            bot/tests/RuntimePrimaryStagingReadOnlyCheckpointReceiptTest.php
            bot/tests/RuntimePrimaryStagingBoundedMutatingSmokeEvidenceVerifierTest.php
            bot/tests/RuntimePrimaryStagingBoundedMutatingSmokeCliContractTest.php
            bot/tests/RuntimePrimaryStagingMutatingSmokePrepareCliContractTest.php
            bot/tests/RuntimePrimaryStagingReadOnlyCheckpointReceiptCliContractTest.php
            bot/tests/RuntimePrimaryStagingReadOnlyCheckpointReceiptShellContractTest.php
          )
          for file in "${files[@]}"; do
            php -l "$file"
          done

      - name: Test mutating smoke approval
        run: php bot/tests/RuntimePrimaryStagingMutatingSmokeApprovalTest.php

      - name: Test bounded rollback core
        run: php bot/tests/RuntimePrimaryStagingBoundedMutatingSmokeTest.php

      - name: Test exact core identities
        run: php bot/tests/RuntimePrimaryStagingBoundedMutatingSmokeExactIdentityTest.php

      - name: Test independent rollback guard
        run: php bot/tests/RuntimePrimaryStagingMutatingSmokeRollbackGuardTest.php

      - name: Test read-only checkpoint receipt
        run: php bot/tests/RuntimePrimaryStagingReadOnlyCheckpointReceiptTest.php

      - name: Test mutating evidence verifier
        run: php bot/tests/RuntimePrimaryStagingBoundedMutatingSmokeEvidenceVerifierTest.php

      - name: Test mutating execution CLI contract
        run: php bot/tests/RuntimePrimaryStagingBoundedMutatingSmokeCliContractTest.php

      - name: Test mutating prepare CLI contract
        run: php bot/tests/RuntimePrimaryStagingMutatingSmokePrepareCliContractTest.php

      - name: Test receipt CLI contract
        run: php bot/tests/RuntimePrimaryStagingReadOnlyCheckpointReceiptCliContractTest.php

      - name: Test receipt shell contract
        run: php bot/tests/RuntimePrimaryStagingReadOnlyCheckpointReceiptShellContractTest.php

      - name: Run current portable focused suite
        run: bash ops/ci/run-current-portable-focused-suite.sh

      - name: Verify exact current evidence bundle
        run: |
          umask 077
          php ops/ci/verify-current-portable-focused-suite-evidence.php \
            --evidence-dir="$MGW_CI_OUTPUT_DIR" \
            --expected-commit="$MGW_CI_EXPECTED_COMMIT" \
            --max-age-seconds=3600 \
            > "$MGW_CI_VERIFICATION_FILE"
          chmod 0600 "$MGW_CI_VERIFICATION_FILE"
          cat "$MGW_CI_VERIFICATION_FILE"

      - name: Upload current focused-suite evidence
        uses: actions/upload-artifact@v4
        with:
          name: mgw-current-focused-${{ steps.bind.outputs.commit }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite.log
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite-summary.json
            ${{ env.MGW_CI_OUTPUT_DIR }}/current-focused-suite-manifest.json
            ${{ env.MGW_CI_VERIFICATION_FILE }}
          if-no-files-found: error
          retention-days: 7
