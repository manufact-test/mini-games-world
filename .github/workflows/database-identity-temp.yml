name: Temporary database identity refactor

on:
  push:
    branches:
      - agent/mvp-14-2-database-migrations

permissions:
  contents: write

jobs:
  update-identity:
    if: ${{ !contains(github.event.head_commit.message, '[database-identity-refactor]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mvp-14-2-database-migrations
          fetch-depth: 0
      - run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('bot/core/ConfigValidator.php')
          source = path.read_text(encoding='utf-8')
          start = source.index('    private static function databaseFingerprint(array $config): string\n    {')
          end = source.index('\n    private static function normalizeHostList', start)
          replacement = '''    private static function databaseFingerprint(array $config): string
    {
        $databaseConfig = DatabaseConfig::fromApplicationConfig($config);
        return $databaseConfig->enabled() ? $databaseConfig->identityFingerprint() : '';
    }
'''
          source = source[:start] + replacement + source[end:]
          path.write_text(source, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot/core/ConfigValidator.php
          git commit -m "Use canonical database identity fingerprint [database-identity-refactor]"
          git push origin HEAD:agent/mvp-14-2-database-migrations
