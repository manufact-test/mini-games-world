name: Portable Self-Hosted Focused Suite

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mgw-portable-self-hosted-focused-${{ github.ref }}
  cancel-in-progress: false

jobs:
  focused:
    name: Full DB-primary focused stack
    runs-on: [self-hosted, linux, x64, mgw-ci]
    timeout-minutes: 45
    env:
      MGW_CI_OUTPUT_DIR: ${{ runner.temp }}/mgw-ci-focused
      MGW_CI_TIMEOUT_SECONDS: '2400'

    steps:
      - name: Checkout exact repository revision
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: true

      - name: Run portable focused suite
        run: bash ops/ci/run-portable-focused-suite.sh

      - name: Show safe summary
        if: always()
        run: |
          if [ -f "$MGW_CI_OUTPUT_DIR/focused-suite-summary.json" ]; then
            cat "$MGW_CI_OUTPUT_DIR/focused-suite-summary.json"
          else
            printf '{"ok":false,"action":"portable_ci_summary_missing"}\n'
          fi

      - name: Upload focused-suite evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mgw-focused-${{ github.sha }}
          path: |
            ${{ runner.temp }}/mgw-ci-focused/focused-suite.log
            ${{ runner.temp }}/mgw-ci-focused/focused-suite-summary.json
            ${{ runner.temp }}/mgw-ci-focused/focused-suite-manifest.json
          if-no-files-found: warn
          retention-days: 7
