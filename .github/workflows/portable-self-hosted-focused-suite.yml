name: Portable Self-Hosted Focused Suite

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mgw-portable-self-hosted-focused-${{ github.ref }}
  cancel-in-progress: false

jobs:
  focused:
    name: Full DB-primary focused stack
    runs-on: [self-hosted, linux, x64, mgw-ci]
    timeout-minutes: 45
    env:
      MGW_CI_OUTPUT_DIR: ${{ runner.temp }}/mgw-ci-focused-${{ github.run_id }}-${{ github.run_attempt }}
      MGW_CI_TIMEOUT_SECONDS: '2400'
      MGW_CI_VERIFICATION_FILE: ${{ runner.temp }}/mgw-ci-focused-verification-${{ github.run_id }}-${{ github.run_attempt }}.json

    steps:
      - name: Checkout exact repository revision
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          clean: true

      - name: Run portable focused suite
        run: bash ops/ci/run-portable-focused-suite.sh

      - name: Verify exact evidence bundle
        run: |
          umask 077
          php ops/ci/verify-portable-focused-suite-evidence.php \
            --evidence-dir="$MGW_CI_OUTPUT_DIR" \
            --expected-commit="$GITHUB_SHA" \
            | tee "$MGW_CI_VERIFICATION_FILE"

      - name: Show safe reports
        if: always()
        run: |
          if [ -f "$MGW_CI_OUTPUT_DIR/focused-suite-summary.json" ]; then
            cat "$MGW_CI_OUTPUT_DIR/focused-suite-summary.json"
          else
            printf '{"ok":false,"action":"portable_ci_summary_missing"}\n'
          fi
          if [ -f "$MGW_CI_VERIFICATION_FILE" ]; then
            cat "$MGW_CI_VERIFICATION_FILE"
          else
            printf '{"ok":false,"action":"portable_ci_verification_missing"}\n'
          fi

      - name: Upload focused-suite evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mgw-focused-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ env.MGW_CI_OUTPUT_DIR }}/focused-suite.log
            ${{ env.MGW_CI_OUTPUT_DIR }}/focused-suite-summary.json
            ${{ env.MGW_CI_OUTPUT_DIR }}/focused-suite-manifest.json
            ${{ env.MGW_CI_VERIFICATION_FILE }}
          if-no-files-found: warn
          retention-days: 7
