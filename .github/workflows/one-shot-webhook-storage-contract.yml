name: One-shot webhook storage contract patch

on:
  push:
    branches:
      - agent/mvp-14-8-3-admin-webhook-repair

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mvp-14-8-3-admin-webhook-repair
          fetch-depth: 0

      - name: Replace legacy concrete storage type hints
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('bot/handlers/WebhookHandler.php')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'private function setPendingPaymentReject(JsonDatabase $db,':
                  'private function setPendingPaymentReject(StorageTransactionInterface $db,',
              'private function cancelPendingPaymentReject(JsonDatabase $db,':
                  'private function cancelPendingPaymentReject(StorageTransactionInterface $db,',
              'private function processPaymentDecision(JsonDatabase $db,':
                  'private function processPaymentDecision(StorageTransactionInterface $db,',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one occurrence of {old!r}, found {count}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')

          test = Path('bot/tests/WebhookHandlerStorageContractTest.php')
          test.write_text("""<?php
declare(strict_types=1);

$source = file_get_contents(dirname(__DIR__) . '/handlers/WebhookHandler.php');
if (!is_string($source)) {
    throw new RuntimeException('Could not read WebhookHandler source.');
}

$expected = [
    'setPendingPaymentReject',
    'cancelPendingPaymentReject',
    'processPaymentDecision',
];

$assertions = 0;
foreach ($expected as $method) {
    $assertions++;
    $pattern = '/private function ' . preg_quote($method, '/') . '\\(StorageTransactionInterface \\$db,/';
    if (preg_match($pattern, $source) !== 1) {
        throw new RuntimeException($method . ' must accept StorageTransactionInterface.');
    }
}

$assertions++;
if (str_contains($source, 'JsonDatabase $db')) {
    throw new RuntimeException('WebhookHandler must not require the legacy JsonDatabase concrete type.');
}

fwrite(STDOUT, "WebhookHandlerStorageContractTest: {$assertions} assertions passed\\n");
""", encoding='utf-8')

          Path('.github/workflows/one-shot-webhook-storage-contract.yml').unlink()
          PY

      - name: Commit patched handler and regression test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bot/handlers/WebhookHandler.php bot/tests/WebhookHandlerStorageContractTest.php .github/workflows/one-shot-webhook-storage-contract.yml
          git commit -m "fix: accept storage adapter in admin payment handler"
          git push origin HEAD:agent/mvp-14-8-3-admin-webhook-repair
